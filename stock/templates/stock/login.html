{% extends 'stock/base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; background: #1e1e1e; padding: 30px; border-radius: 10px;">
    <h2 style="color: #b22222; text-align: center;">М Склад</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div style="background: {% if message.tags == 'error' %}#b22222{% else %}#2a2a2a{% endif %}; color: white; padding: 10px; margin: 10px 0; border-radius: 5px;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <!-- Вкладки -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #b22222;">
        <button onclick="showTab('login')" id="tab-login" class="tab-btn active" style="background: none; border: none; color: #b22222; padding: 10px 20px; cursor: pointer;">Вход</button>
        <button onclick="showTab('create')" id="tab-create" class="tab-btn" style="background: none; border: none; color: #888; padding: 10px 20px; cursor: pointer;">Создать ключ</button>
    </div>
    
    <!-- Форма входа -->
    <div id="login-tab" class="tab-content">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">
            <div style="margin-bottom: 15px;">
                <label>Ваше имя:</label>
                <input type="text" name="name" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Ключ доступа:</label>
                <input type="password" name="key" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222; border-radius: 4px;">
            </div>
            <button type="submit" style="width: 100%; background: #b22222; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Войти</button>
        </form>
    </div>
    
    <!-- Форма создания ключа -->
    <div id="create-tab" class="tab-content" style="display: none;">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="create_key">
            <div style="margin-bottom: 15px;">
                <label>Ваше имя:</label>
                <input type="text" name="name" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Новый ключ (придумайте сами):</label>
                <input type="text" name="new_key" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222; border-radius: 4px;">
            </div>
            <button type="submit" style="width: 100%; background: #333; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Создать ключ</button>
        </form>
        <p style="margin-top: 15px; font-size: 12px; color: #888;">После создания ключа дождитесь активации администратором</p>
    </div>
</div>

<script>
function showTab(tab) {
    document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('create-tab').style.display = tab === 'create' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.style.color = '#888';
        btn.classList.remove('active');
    });
    document.getElementById(`tab-${tab}`).style.color = '#b22222';
    document.getElementById(`tab-${tab}`).classList.add('active');
}
</script>
{% endblock %}
